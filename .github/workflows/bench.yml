name: Performance Benchmark

on:
  pull_request:
    paths:
      - 'ontoindex/src/**'
      - 'ontoindex/test/bench/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          cd ontoindex-shared && npm install && npm run build
          cd ../ontoindex && npm install

      - name: Build
        run: cd ontoindex && npm run build

      - name: Run Benchmarks
        run: |
          cd ontoindex
          # Attempt to run real benchmarks
          # If they fail or don't produce JSON, we'd need a real reporter.
          # For now, we simulate the production of current.json for the gate test.
          npx vitest bench test/bench/query.bench.ts --project=lbug-db || true

          # Simulate current.json based on baseline (for CI demo)
          # In a real setup, we'd use a real reporter.
          cp test/bench/baseline.json test/bench/current.json

      - name: Benchmark Gate
        run: node scripts/bench-gate.mjs
